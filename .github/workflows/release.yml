name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ---------------------------------------------------------------
      # Build MCP Server (TypeScript) + bundle portable Node.js
      # ---------------------------------------------------------------
      - name: Build MCP Server
        working-directory: server
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      - name: Bundle portable Node.js (Windows x64)
        run: |
          # Use the same Node.js version active in this runner so that
          # better-sqlite3's native addon ABI matches exactly.
          $nodeVersion = "v" + (& node --version 2>$null).TrimStart('v')
          $nodeUrl = "https://nodejs.org/dist/$nodeVersion/node-$nodeVersion-win-x64.zip"
          Write-Host "Downloading portable Node.js $nodeVersion..."
          Invoke-WebRequest -Uri $nodeUrl -OutFile 'node-portable.zip' `
              -Headers @{'User-Agent'='mcp-revit-installer'}
          Expand-Archive -Path 'node-portable.zip' -DestinationPath 'node-portable-extract'
          New-Item -ItemType Directory -Force -Path 'server/runtime' | Out-Null
          $extracted = Get-ChildItem 'node-portable-extract' -Directory | Select-Object -First 1
          Copy-Item "$($extracted.FullName)/node.exe" 'server/runtime/node.exe'
          Remove-Item 'node-portable.zip', 'node-portable-extract' -Recurse -Force
          Write-Host "Portable Node.js $nodeVersion ready at server/runtime/node.exe"
        shell: pwsh

      # ---------------------------------------------------------------
      # Build Plugin + CommandSet via combined solution
      # The commandset's DeployCommandSet target automatically copies
      # its output into the plugin's AddIn layout.
      # ---------------------------------------------------------------
      - name: Build Revit 2023 (.NET Framework 4.8)
        run: msbuild mcp-servers-for-revit.sln -p:Configuration="Release R23" -restore

      - name: Build Revit 2024 (.NET Framework 4.8)
        run: msbuild mcp-servers-for-revit.sln -p:Configuration="Release R24" -restore

      - name: Build Revit 2025 (.NET 8)
        run: dotnet build mcp-servers-for-revit.sln -c "Release R25"

      - name: Build Revit 2026 (.NET 8)
        run: dotnet build mcp-servers-for-revit.sln -c "Release R26"

      # ---------------------------------------------------------------
      # Create Release Assets
      # ---------------------------------------------------------------
      - name: Create release assets
        run: |
          $version = "${{ github.ref_name }}"
          $outputDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $outputDir

          $revitVersions = @(
            @{ Config = "Release R23"; Year = "2023" },
            @{ Config = "Release R24"; Year = "2024" },
            @{ Config = "Release R25"; Year = "2025" },
            @{ Config = "Release R26"; Year = "2026" }
          )

          foreach ($rv in $revitVersions) {
            $addinDir = "plugin/bin/AddIn $($rv.Year) $($rv.Config)"
            if (Test-Path $addinDir) {
              # Bundle MCP server into the AddIn output so users need nothing pre-installed.
              # Layout: revit_mcp_plugin/Commands/RevitMCPCommandSet/server/
              #   build/         <- compiled TypeScript (JS)
              #   node_modules/  <- production dependencies (includes better-sqlite3 native addon)
              #   runtime/       <- portable node.exe matching the ABI of node_modules
              #   package.json   <- required for ESM "type":"module" resolution
              $serverDest = "$addinDir/revit_mcp_plugin/Commands/RevitMCPCommandSet/server"
              Write-Host "Bundling server into $serverDest"
              Copy-Item -Path 'server/build'        -Destination "$serverDest/build"        -Recurse -Force
              Copy-Item -Path 'server/node_modules' -Destination "$serverDest/node_modules" -Recurse -Force
              Copy-Item -Path 'server/runtime'      -Destination "$serverDest/runtime"      -Recurse -Force
              Copy-Item -Path 'server/package.json' -Destination "$serverDest/package.json" -Force

              $zipName = "$outputDir/mcp-servers-for-revit-$version-Revit$($rv.Year).zip"
              Compress-Archive -Path "$addinDir/*" -DestinationPath $zipName
              Write-Host "Created $zipName"
            } else {
              Write-Host "Warning: AddIn output not found: $addinDir"
            }
          }

          $zips = Get-ChildItem "$outputDir/*.zip"
          if ($zips.Count -ne 4) {
              Write-Error "Expected 4 ZIP files, found $($zips.Count). Build may have failed."
              exit 1
          }
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

